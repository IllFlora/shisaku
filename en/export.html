        // This site now uses on-page translation instead of separate English pages.

        (function () {
            var host = location.hostname;
            var targets = ['', ';domain=' + host];
            if (host.indexOf('.') > -1) targets.push(';domain=.' + host);
            targets.forEach(function (s) { document.cookie = 'googtrans=/ja/en;path=/' + s; });

        })();
    </script>
