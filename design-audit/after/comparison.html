<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Grand Trading Before / After</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; padding: 40px; background: #eef2f6; color: #0a192f; font-family: sans-serif; }
    h1 { margin: 0 0 32px; }
    section { margin-bottom: 48px; }
    h2 { margin: 0 0 16px; font-size: 20px; }
    .pair { display: grid; grid-template-columns: repeat(2, 390px); gap: 24px; align-items: start; }
    figure { margin: 0; padding: 12px; background: white; box-shadow: 0 8px 24px rgba(10, 25, 47, .08); }
    figcaption { margin-bottom: 10px; font-weight: 700; }
    img { display: block; width: 100%; height: auto; }
  </style>
</head>
<body>
  <h1>Grand Trading — Before / After</h1>
  <section>
    <h2>トップページのモバイル見出し</h2>
    <div class="pair">
      <figure><figcaption>Before</figcaption><img src="../09-home-mobile.png" alt="修正前トップ"></figure>
      <figure><figcaption>After</figcaption><img src="01-home-mobile-after.png" alt="修正後トップ"></figure>
    </div>
  </section>
  <section>
    <h2>アクセス会場カード</h2>
    <div class="pair">
      <figure><figcaption>Before</figcaption><img src="../28-access-cards-mobile.png" alt="修正前会場カード"></figure>
      <figure><figcaption>After</figcaption><img src="02-access-cards-mobile-after.png" alt="修正後会場カード"></figure>
    </div>
  </section>
  <section>
    <h2>対象顧客へのアンカー遷移</h2>
    <div class="pair">
      <figure><figcaption>Before</figcaption><img src="../29-clients-anchor-mobile.png" alt="修正前アンカー遷移"></figure>
      <figure><figcaption>After</figcaption><img src="03-clients-anchor-mobile-after.png" alt="修正後アンカー遷移"></figure>
    </div>
  </section>
</body>
</html>
